<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Streamproof Menu</title>
    <style>
        /* This keeps the webpage background clear so you can see the game behind it */
        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* The actual menu box container */
        .menu-wrapper {
            position: absolute;
            top: 15%;
            left: 5%;
            width: 300px;
            background: rgba(20, 20, 20, 0.98);
            border: 2px solid #ff3333;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
            color: white;
        }

        .menu-title {
            font-size: 20px;
            font-weight: bold;
            color: #ff3333;
            text-align: center;
            border-bottom: 2px solid #333;
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .menu-btn {
            background: #252525;
            color: white;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #444;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s ease;
        }

        /* Hover animation effect */
        .menu-btn:hover {
            background: #ff3333;
            color: black;
            border-color: #ff3333;
        }
    </style>
</head>
<body>

    <div class="menu-wrapper">
        <div class="menu-title">redENGINE DUI</div>
        <div class="menu-btn">Heal Player</div>
        <div class="menu-btn">Give Armor</div>
        <div class="menu-btn">Clean Clothes</div>
    </div>

</body>
</html>
