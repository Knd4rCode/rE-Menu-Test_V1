<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Streamproof Menu</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: transparent !important; /* Force transparent web frame */
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Position the actual visible menu box on the left side of the screen */
        .menu-wrapper {
            position: absolute;
            top: 20%;
            left: 5%;
            width: 320px;
            background: rgba(15, 15, 15, 0.98);
            border: 2px solid #ff3333;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
            color: white;
            box-sizing: border-box;
        }

        .menu-title {
            font-size: 22px;
            font-weight: bold;
            color: #ff3333;
            text-align: center;
            border-bottom: 2px solid #333;
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .menu-btn {
            background: #252525;
            color: white;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #444;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .menu-btn:hover {
            background: #ff3333;
            color: black;
        }
    </style>
</head>
<body>

    <div class="menu-wrapper">
        <div class="menu-title">redENGINE DUI</div>
        <div class="menu-btn">Heal Player</div>
        <div class="menu-btn">Give Armor</div>
    </div>

</body>
</html>
