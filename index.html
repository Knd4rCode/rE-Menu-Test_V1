<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Streamproof Menu</title>
    <style>
        /* Hidden by default until the Lua script tells it to open */
        body {
            margin: 0;
            padding: 0;
            background-color: transparent !important;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            display: none; 
        }

        .menu-wrapper {
            position: absolute;
            top: 15%;
            left: 5%;
            width: 300px;
            background: rgba(20, 20, 20, 0.98);
            border: 2px solid #ff3333;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
            color: white;
        }

        .menu-title {
            font-size: 20px;
            font-weight: bold;
            color: #ff3333;
            text-align: center;
            border-bottom: 2px solid #333;
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .menu-btn {
            background: #252525;
            color: white;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #444;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
        }

        .menu-btn:hover {
            background: #ff3333;
            color: black;
        }
    </style>
</head>
<body>

    <div class="menu-wrapper">
        <div class="menu-title">redENGINE NUI</div>
        <div class="menu-btn">Heal Player</div>
        <div class="menu-btn">Give Armor</div>
    </div>

    <script>
        // This listens to your redENGINE Lua script toggles!
        window.addEventListener('message', function(event) {
            if (event.data.type === "open_menu") {
                document.body.style.display = "block";
            } else if (event.data.type === "close_menu") {
                document.body.style.display = "none";
            }
        });
    </script>
</body>
</html>
